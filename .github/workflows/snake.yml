name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for the post-processing script)
        uses: actions/checkout@v4

      - name: Generate snake from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Board stays default GitHub; only the snake is recoloured terracotta
          # so the Claude logos read on-brand.
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#D97757
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#D97757

      - name: Turn the snake into Claude logos
        run: |
          sudo chown -R "$(id -u):$(id -g)" dist   # snk runs as root in Docker; take ownership
          python3 scripts/logofy.py

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
